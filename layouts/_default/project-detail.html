{{ define "main" }}
<div style="padding-top: 100px;">
    <section class="portfolio-section">
        <div class="container" style="max-width: 900px;">

            <!-- Back Link -->
            <div style="margin-bottom: 24px;">
                <a href="{{ "projects/" | relURL }}"
                    style="color: var(--primary-light); text-decoration: none; font-size: 0.9rem; font-weight: 500;">
                    ← Back to All Projects
                </a>
            </div>

            <!-- Title -->
            <h1 style="font-size: clamp(2rem, 4vw, 2.8rem); font-weight: 800; margin-bottom: 24px; line-height: 1.2;">
                {{ .Title }}
            </h1>

            <!-- Content -->
            <div class="project-detail-content">
                {{ .Content }}
            </div>

            <!-- Back Links -->
            <div
                style="margin-top: 60px; padding-top: 32px; border-top: 1px solid var(--bg-glass-border); display: flex; gap: 16px;">
                <a href="{{ "projects/" | relURL }}" class="btn btn-outline">← All Projects</a>
                <a href="{{ "/#projects" | relURL }}" class="btn btn-outline">🏠 Home</a>
            </div>
        </div>
    </section>
</div>

<style>
    .project-detail-content h2 {
        font-size: 1.6rem;
        font-weight: 700;
        margin-top: 48px;
        margin-bottom: 16px;
        background: var(--gradient-primary);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    .project-detail-content h3 {
        font-size: 1.2rem;
        font-weight: 600;
        margin-top: 32px;
        margin-bottom: 12px;
        color: var(--text-primary);
    }

    .project-detail-content p {
        color: var(--text-secondary);
        font-size: 1.05rem;
        line-height: 1.8;
        margin-bottom: 16px;
    }

    .project-detail-content strong {
        color: var(--text-primary);
    }

    .project-detail-content ul,
    .project-detail-content ol {
        color: var(--text-secondary);
        padding-left: 24px;
        margin-bottom: 16px;
    }

    .project-detail-content li {
        margin-bottom: 6px;
        line-height: 1.7;
    }

    .project-detail-content img {
        width: 100%;
        border-radius: var(--radius-lg);
        margin: 24px 0;
        box-shadow: var(--shadow-lg);
        border: 1px solid var(--bg-glass-border);
    }

    .project-detail-content table {
        width: 100%;
        border-collapse: collapse;
        margin: 24px 0;
        font-size: 0.9rem;
    }

    .project-detail-content th {
        background: rgba(108, 99, 255, 0.15);
        color: var(--primary-light);
        padding: 12px 16px;
        text-align: left;
        font-weight: 600;
        border-bottom: 2px solid rgba(108, 99, 255, 0.3);
    }

    .project-detail-content td {
        padding: 10px 16px;
        border-bottom: 1px solid var(--bg-glass-border);
        color: var(--text-secondary);
    }

    .project-detail-content tr:hover td {
        background: rgba(255, 255, 255, 0.02);
    }

    .project-detail-content code {
        background: rgba(108, 99, 255, 0.1);
        color: var(--primary-light);
        padding: 2px 8px;
        border-radius: 4px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.85em;
    }

    .project-detail-content pre {
        background: rgba(0, 0, 0, 0.4);
        border: 1px solid var(--bg-glass-border);
        border-radius: var(--radius-md);
        padding: 20px;
        overflow-x: auto;
        margin: 24px 0;
    }

    .project-detail-content pre code {
        background: none;
        padding: 0;
        color: var(--text-secondary);
        font-size: 0.85rem;
        line-height: 1.6;
    }

    .project-detail-content hr {
        border: none;
        border-top: 1px solid var(--bg-glass-border);
        margin: 40px 0;
    }

    .project-detail-content blockquote {
        border-left: 3px solid var(--primary);
        padding-left: 20px;
        margin: 24px 0;
        color: var(--text-muted);
        font-style: italic;
    }
</style>
{{ end }}
