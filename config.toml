baseURL = "https://ttuandatt.github.io/AWS-Workshop/"
publishDir = "public"
canonifyURLs = false
relativeURLs = false

title = "Tuan Dat | Cloud & Backend Developer"
theme = "relearn"

defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

# ------------------------------------------------
# Outputs
# ------------------------------------------------
[outputs]
home = ["HTML", "RSS", "JSON"]

# ------------------------------------------------
# Params
# ------------------------------------------------
[params]
  showLanguageSelector = false
  disableLandingPageButton = true
  [params.search]
    disable = true
  disableSeoHiddenPages = true
  # Use our custom portfolio layout instead of relearn
  customCSS = ["css/portfolio.css"]
  customJS = ["js/portfolio.js"]

# ------------------------------------------------
# Menu
# ------------------------------------------------
[menu]
  [[menu.main]]
    name = "Home"
    url = "#hero"
    weight = 1
  [[menu.main]]
    name = "About"
    url = "#about"
    weight = 2
  [[menu.main]]
    name = "Skills"
    url = "#skills"
    weight = 3
  [[menu.main]]
    name = "Experience"
    url = "#experience"
    weight = 4
  [[menu.main]]
    name = "Projects"
    url = "#projects"
    weight = 5
  [[menu.main]]
    name = "Contact"
    url = "#contact"
    weight = 6

# ------------------------------------------------
# Markup
# ------------------------------------------------
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true